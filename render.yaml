# Staging blueprint (Render). Не production — тимчасовий API + Postgres.
# Deploy: Dashboard → New → Blueprint → підключити репозиторій malva-garden.
# Після деплою: npm run staging:vercel-env -- <API_URL>

services:
  - type: web
    name: malva-api-staging
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start:staging
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        value: https://web-black-nine-61.vercel.app
      - key: ADMIN_ORIGIN
        value: https://admin-swart-rho-88.vercel.app
      - key: ADMIN_SEED_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: malva-staging-db
          property: connectionString

databases:
  - name: malva-staging-db
    plan: free
    databaseName: malva_garden
    user: malva
