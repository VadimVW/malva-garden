# Production stack — Netcup VPS 500 G12
# Usage: cp .env.production.example .env && edit → docker compose -f docker-compose.prod.yml --env-file .env up -d --build

name: malva-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: malva
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: malva_garden
    volumes:
      - malva_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malva -d malva_garden"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 768M

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://malva:${POSTGRES_PASSWORD}@db:5432/malva_garden
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN:?set WEB_ORIGIN}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:?set ADMIN_ORIGIN}
      API_PUBLIC_ORIGIN: ${API_PUBLIC_ORIGIN:?set API_PUBLIC_ORIGIN}
      UPLOAD_DIR: uploads
      EMAIL_VERIFICATION_DEV: ${EMAIL_VERIFICATION_DEV:-false}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      NOVA_POSHTA_API_KEY: ${NOVA_POSHTA_API_KEY:-}
      WAYFORPAY_MERCHANT_ACCOUNT: ${WAYFORPAY_MERCHANT_ACCOUNT:-}
      WAYFORPAY_MERCHANT_SECRET: ${WAYFORPAY_MERCHANT_SECRET:-}
      WAYFORPAY_MERCHANT_PASSWORD: ${WAYFORPAY_MERCHANT_PASSWORD:-}
      WAYFORPAY_MERCHANT_DOMAIN: ${WAYFORPAY_MERCHANT_DOMAIN:-}
      WAYFORPAY_RETURN_URL: ${WAYFORPAY_RETURN_URL:-}
      WAYFORPAY_SERVICE_URL: ${WAYFORPAY_SERVICE_URL:-}
    volumes:
      - api_uploads:/app/apps/api/uploads
    expose:
      - "4000"
    deploy:
      resources:
        limits:
          memory: 1024M

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?set NEXT_PUBLIC_SITE_URL}
        # Web build: NEXT_PUBLIC_* is inlined at build time (not in container env at runtime).
        # If only GOOGLE_CLIENT_ID is set in .env, it is used for the storefront button too.
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      INTERNAL_API_URL: http://api:4000/api/v1
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 768M

  admin:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
      - admin
    ports:
      - "80:80"
      - "443:443"
      - "3001:3001"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-}
      # §14.1.3 — Basic Auth «двері» перед адмінкою (bcrypt hash; $ у .env → $$)
      ADMIN_BASIC_AUTH_USER: ${ADMIN_BASIC_AUTH_USER:?set ADMIN_BASIC_AUTH_USER}
      ADMIN_BASIC_AUTH_HASH: ${ADMIN_BASIC_AUTH_HASH:?set ADMIN_BASIC_AUTH_HASH}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  malva_pgdata:
  api_uploads:
  caddy_data:
  caddy_config:
