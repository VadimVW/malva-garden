name: Deploy VPS (production)

on:
  push:
    branches:
      - deploy/vps-production
  workflow_dispatch:

concurrency:
  group: vps-prod-deploy
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy to VPS
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 55m
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${DEPLOY_PATH:-/opt/malva-garden}"
            cd "$DEPLOY_PATH"
            bash scripts/deploy-vps.sh
